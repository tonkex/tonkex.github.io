<svg xmlns="http://www.w3.org/2000/svg" width="980" height="460" viewBox="0 0 980 460" role="img" aria-labelledby="title desc">
  <title id="title">Minimal LLM serving stack</title>
  <desc id="desc">A minimal OpenAI-compatible LLM serving stack connects a client, HTTP API, tokenizer, scheduler, model runtime, GPU memory, and metrics.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="980" height="460" fill="#f8fafc"/>
  <g font-family="Inter, Pretendard, Arial, sans-serif">
    <text x="490" y="46" text-anchor="middle" font-size="26" font-weight="800" fill="#0f172a">OpenAI-compatible endpoint는 얇은 API이고, 실제 병목은 runtime 아래에 있다</text>
    <g transform="translate(46 110)">
      <rect x="0" y="0" width="120" height="70" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="60" y="32" text-anchor="middle" font-size="16" font-weight="800" fill="#0f172a">Client</text>
      <text x="60" y="53" text-anchor="middle" font-size="12" fill="#475569">curl / SDK</text>
    </g>
    <g transform="translate(206 110)">
      <rect x="0" y="0" width="142" height="70" rx="10" fill="#eff6ff" stroke="#93c5fd"/>
      <text x="71" y="32" text-anchor="middle" font-size="16" font-weight="800" fill="#1e3a8a">HTTP API</text>
      <text x="71" y="53" text-anchor="middle" font-size="12" fill="#475569">/v1/chat</text>
    </g>
    <g transform="translate(388 110)">
      <rect x="0" y="0" width="130" height="70" rx="10" fill="#fefce8" stroke="#fde047"/>
      <text x="65" y="32" text-anchor="middle" font-size="16" font-weight="800" fill="#854d0e">Tokenizer</text>
      <text x="65" y="53" text-anchor="middle" font-size="12" fill="#475569">chat template</text>
    </g>
    <g transform="translate(558 110)">
      <rect x="0" y="0" width="136" height="70" rx="10" fill="#ecfdf5" stroke="#86efac"/>
      <text x="68" y="32" text-anchor="middle" font-size="16" font-weight="800" fill="#166534">Scheduler</text>
      <text x="68" y="53" text-anchor="middle" font-size="12" fill="#475569">batch / queue</text>
    </g>
    <g transform="translate(734 110)">
      <rect x="0" y="0" width="160" height="70" rx="10" fill="#fff7ed" stroke="#fdba74"/>
      <text x="80" y="32" text-anchor="middle" font-size="16" font-weight="800" fill="#9a3412">Model runtime</text>
      <text x="80" y="53" text-anchor="middle" font-size="12" fill="#475569">weights + kernels</text>
    </g>
    <g stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow)">
      <path d="M166 145 H198"/>
      <path d="M348 145 H380"/>
      <path d="M518 145 H550"/>
      <path d="M694 145 H726"/>
    </g>
    <g transform="translate(254 266)">
      <rect x="0" y="0" width="190" height="74" rx="10" fill="#ede9fe" stroke="#c4b5fd"/>
      <text x="95" y="32" text-anchor="middle" font-size="16" font-weight="800" fill="#5b21b6">Model artifact</text>
      <text x="95" y="54" text-anchor="middle" font-size="12" fill="#475569">weights / config / tokenizer</text>
    </g>
    <g transform="translate(520 266)">
      <rect x="0" y="0" width="210" height="74" rx="10" fill="#f0fdfa" stroke="#5eead4"/>
      <text x="105" y="32" text-anchor="middle" font-size="16" font-weight="800" fill="#0f766e">GPU memory</text>
      <text x="105" y="54" text-anchor="middle" font-size="12" fill="#475569">weights / KV cache / overhead</text>
    </g>
    <g transform="translate(780 266)">
      <rect x="0" y="0" width="132" height="74" rx="10" fill="#f8fafc" stroke="#94a3b8"/>
      <text x="66" y="32" text-anchor="middle" font-size="16" font-weight="800" fill="#334155">Metrics</text>
      <text x="66" y="54" text-anchor="middle" font-size="12" fill="#475569">TTFT / TPOT</text>
    </g>
    <g stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
      <path d="M349 266 C392 220 420 190 452 180"/>
      <path d="M625 266 C650 224 700 194 766 180"/>
      <path d="M846 266 V190"/>
    </g>
    <text x="490" y="410" text-anchor="middle" font-size="15" fill="#334155">Endpoint가 같아도 tokenizer, model config, scheduler, GPU memory 정책이 다르면 완전히 다른 serving system이다.</text>
  </g>
</svg>
