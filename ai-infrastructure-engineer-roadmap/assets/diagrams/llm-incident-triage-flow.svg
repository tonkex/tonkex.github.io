<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">LLM serving incident triage flow</title>
  <desc id="desc">Flow from user symptom to request metrics, runtime metrics, GPU metrics, Kubernetes state, and trace/log evidence.</desc>
  <style>
    .bg { fill: #f8fafc; }
    .start { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; rx: 10; }
    .metric { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2; rx: 10; }
    .runtime { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 10; }
    .gpu { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 10; }
    .k8s { fill: #f1f5f9; stroke: #64748b; stroke-width: 2; rx: 10; }
    .end { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; rx: 10; }
    .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; font-size: 17px; }
    .small { font-size: 14px; fill: #334155; }
    .title { font-size: 22px; font-weight: 700; }
    .arrow { stroke: #475569; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="430"/>
  <text class="text title" x="55" y="55">Triage slow LLM serving by following the bottleneck signal</text>

  <rect class="start" x="60" y="115" width="165" height="70"/>
  <text class="text" x="94" y="145">Symptom</text>
  <text class="small" x="88" y="170">p95 latency up</text>

  <rect class="metric" x="285" y="80" width="180" height="75"/>
  <text class="text" x="333" y="111">Request</text>
  <text class="small" x="308" y="137">TTFT vs TPOT</text>

  <rect class="runtime" x="285" y="205" width="180" height="75"/>
  <text class="text" x="335" y="236">Runtime</text>
  <text class="small" x="305" y="262">queue, KV, batch</text>

  <rect class="gpu" x="535" y="80" width="180" height="75"/>
  <text class="text" x="585" y="111">GPU</text>
  <text class="small" x="565" y="137">util, memory, temp</text>

  <rect class="k8s" x="535" y="205" width="180" height="75"/>
  <text class="text" x="582" y="236">Kubernetes</text>
  <text class="small" x="558" y="262">pod, node, rollout</text>

  <rect class="end" x="770" y="140" width="155" height="95"/>
  <text class="text" x="809" y="174">Evidence</text>
  <text class="small" x="796" y="199">trace + logs</text>
  <text class="small" x="798" y="219">version labels</text>

  <path class="arrow" d="M225 150 C245 130, 260 118, 280 118"/>
  <path class="arrow" d="M225 155 C250 190, 260 230, 280 240"/>
  <path class="arrow" d="M465 118 L530 118"/>
  <path class="arrow" d="M465 242 L530 242"/>
  <path class="arrow" d="M715 118 C745 132, 760 145, 768 160"/>
  <path class="arrow" d="M715 242 C745 228, 760 214, 768 202"/>

  <text class="small" x="80" y="365">Do not stop at "GPU high" or "latency high". A good incident note links symptom, bottleneck metric, affected version, and corrective action.</text>
</svg>
