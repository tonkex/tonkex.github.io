<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Query key value attention and KV cache</title>
  <desc id="desc">The current token creates a query while prior tokens provide cached keys and values. Decode reads cached keys and values instead of recomputing them.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/>
    </marker>
  </defs>
  <rect width="980" height="520" fill="#f8fafc"/>
  <g font-family="Inter, Pretendard, Arial, sans-serif">
    <text x="490" y="48" text-anchor="middle" font-size="26" font-weight="800" fill="#0f172a">Decode에서 현재 token은 Q를 만들고, 과거 token은 cached K/V로 남는다</text>
    <g transform="translate(60 100)">
      <rect x="0" y="0" width="360" height="310" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="180" y="36" text-anchor="middle" font-size="20" font-weight="800" fill="#0f172a">past tokens</text>
      <g transform="translate(42 72)">
        <rect x="0" y="0" width="62" height="34" rx="6" fill="#dbeafe" stroke="#93c5fd"/>
        <rect x="78" y="0" width="62" height="34" rx="6" fill="#dbeafe" stroke="#93c5fd"/>
        <rect x="156" y="0" width="62" height="34" rx="6" fill="#dbeafe" stroke="#93c5fd"/>
        <rect x="234" y="0" width="62" height="34" rx="6" fill="#dbeafe" stroke="#93c5fd"/>
        <text x="31" y="23" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">t1</text>
        <text x="109" y="23" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">t2</text>
        <text x="187" y="23" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">t3</text>
        <text x="265" y="23" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">t4</text>
      </g>
      <g transform="translate(48 156)">
        <rect x="0" y="0" width="112" height="62" rx="8" fill="#ecfdf5" stroke="#86efac"/>
        <rect x="164" y="0" width="112" height="62" rx="8" fill="#fef3c7" stroke="#fbbf24"/>
        <text x="56" y="27" text-anchor="middle" font-size="18" font-weight="800" fill="#166534">K cache</text>
        <text x="56" y="48" text-anchor="middle" font-size="12" fill="#475569">per layer</text>
        <text x="220" y="27" text-anchor="middle" font-size="18" font-weight="800" fill="#92400e">V cache</text>
        <text x="220" y="48" text-anchor="middle" font-size="12" fill="#475569">per layer</text>
      </g>
      <text x="180" y="272" text-anchor="middle" font-size="14" fill="#475569">과거 token의 K/V는 request가 살아 있는 동안 유지된다</text>
    </g>
    <g transform="translate(560 100)">
      <rect x="0" y="0" width="360" height="310" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="180" y="36" text-anchor="middle" font-size="20" font-weight="800" fill="#0f172a">current token</text>
      <rect x="136" y="72" width="88" height="42" rx="8" fill="#fee2e2" stroke="#fca5a5"/>
      <text x="180" y="99" text-anchor="middle" font-size="15" font-weight="800" fill="#991b1b">new token</text>
      <rect x="124" y="160" width="112" height="62" rx="8" fill="#ede9fe" stroke="#c4b5fd"/>
      <text x="180" y="187" text-anchor="middle" font-size="18" font-weight="800" fill="#5b21b6">Q</text>
      <text x="180" y="208" text-anchor="middle" font-size="12" fill="#475569">query now</text>
      <text x="180" y="272" text-anchor="middle" font-size="14" fill="#475569">새 token의 K/V는 계산 후 cache에 append된다</text>
    </g>
    <path d="M690 222 C630 260 520 274 394 203" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>
    <path d="M690 222 C625 315 505 330 394 203" fill="none" stroke="#16a34a" stroke-width="3" marker-end="url(#arrow-green)"/>
    <text x="490" y="448" text-anchor="middle" font-size="16" fill="#334155">Q는 현재 token에서 오고, K/V는 과거 cache에서 온다. 그래서 decode는 cache read path와 memory bandwidth에 민감해진다.</text>
  </g>
</svg>
