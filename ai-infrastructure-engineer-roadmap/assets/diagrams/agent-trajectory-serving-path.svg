<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="560" viewBox="0 0 1240 560" role="img" aria-labelledby="title desc">
  <title id="title">Agent trajectory serving path</title>
  <desc id="desc">Agent trajectory from user request through planner, model calls, tool calls, memory, handoff, approval, and final response.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}
      .box{fill:#ffffff;stroke:#334155;stroke-width:2;rx:10}
      .llm{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:10}
      .tool{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:10}
      .state{fill:#fff7ed;stroke:#f97316;stroke-width:2;rx:10}
      .risk{fill:#ffe4e6;stroke:#e11d48;stroke-width:2;rx:10}
      .text{font-family:Arial,Helvetica,sans-serif;fill:#111827;font-size:20px;font-weight:700}
      .small{font-family:Arial,Helvetica,sans-serif;fill:#374151;font-size:15px}
      .line{stroke:#334155;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#64748b;stroke-width:2;stroke-dasharray:7 7;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1240" height="560"/>
  <rect class="box" x="45" y="80" width="145" height="86"/>
  <text class="text" x="118" y="115" text-anchor="middle">User</text>
  <text class="small" x="118" y="143" text-anchor="middle">goal</text>
  <rect class="llm" x="240" y="80" width="155" height="86"/>
  <text class="text" x="318" y="115" text-anchor="middle">Planner</text>
  <text class="small" x="318" y="143" text-anchor="middle">model call</text>
  <rect class="tool" x="445" y="80" width="160" height="86"/>
  <text class="text" x="525" y="115" text-anchor="middle">Tool call</text>
  <text class="small" x="525" y="143" text-anchor="middle">API / search / DB</text>
  <rect class="llm" x="655" y="80" width="160" height="86"/>
  <text class="text" x="735" y="115" text-anchor="middle">Observe</text>
  <text class="small" x="735" y="143" text-anchor="middle">next model call</text>
  <rect class="state" x="865" y="80" width="160" height="86"/>
  <text class="text" x="945" y="115" text-anchor="middle">Memory</text>
  <text class="small" x="945" y="143" text-anchor="middle">state update</text>
  <rect class="box" x="1075" y="80" width="130" height="86"/>
  <text class="text" x="1140" y="115" text-anchor="middle">Answer</text>
  <text class="small" x="1140" y="143" text-anchor="middle">final output</text>
  <path class="line" d="M190 123 H240"/>
  <path class="line" d="M395 123 H445"/>
  <path class="line" d="M605 123 H655"/>
  <path class="line" d="M815 123 H865"/>
  <path class="line" d="M1025 123 H1075"/>
  <path class="dash" d="M945 166 V230 C945 260 360 260 318 166"/>
  <text class="small" x="626" y="248" text-anchor="middle">loop until final output, handoff, approval, timeout, or max_turns</text>

  <rect class="state" x="240" y="335" width="180" height="92"/>
  <text class="text" x="330" y="372" text-anchor="middle">Handoff</text>
  <text class="small" x="330" y="400" text-anchor="middle">specialist agent</text>
  <rect class="risk" x="530" y="335" width="180" height="92"/>
  <text class="text" x="620" y="372" text-anchor="middle">Approval</text>
  <text class="small" x="620" y="400" text-anchor="middle">human gate</text>
  <rect class="risk" x="820" y="335" width="180" height="92"/>
  <text class="text" x="910" y="372" text-anchor="middle">Guardrail</text>
  <text class="small" x="910" y="400" text-anchor="middle">policy / schema</text>
  <path class="dash" d="M330 335 C360 250 415 170 525 166"/>
  <path class="dash" d="M620 335 C650 260 710 170 735 166"/>
  <path class="dash" d="M910 335 C920 260 925 210 945 166"/>
  <rect class="box" x="265" y="470" width="710" height="52"/>
  <text class="small" x="620" y="502" text-anchor="middle">Budget: model calls, tool calls, total tokens, wall-clock time, external cost, side effects</text>
</svg>
