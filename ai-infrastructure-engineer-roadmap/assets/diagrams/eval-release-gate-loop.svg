<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Evaluation release gate loop</title>
  <desc id="desc">Candidate change flows through offline evaluation, serving benchmark, safety checks, canary analysis, and promote or rollback decisions.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f3a4a"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}
      .box{fill:#ffffff;stroke:#39495f;stroke-width:2;rx:10}
      .gate{fill:#eef7f2;stroke:#15803d;stroke-width:2;rx:10}
      .fail{fill:#fff1f2;stroke:#be123c;stroke-width:2;rx:10}
      .store{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:10}
      .text{font-family:Arial,Helvetica,sans-serif;fill:#111827;font-size:22px;font-weight:700}
      .small{font-family:Arial,Helvetica,sans-serif;fill:#374151;font-size:16px}
      .line{stroke:#2f3a4a;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#64748b;stroke-width:2;stroke-dasharray:7 7;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="520"/>
  <rect class="box" x="45" y="90" width="170" height="95"/>
  <text class="text" x="130" y="128" text-anchor="middle">Candidate</text>
  <text class="small" x="130" y="157" text-anchor="middle">model / prompt</text>
  <text class="small" x="130" y="180" text-anchor="middle">runtime / quant</text>
  <rect class="gate" x="275" y="90" width="170" height="95"/>
  <text class="text" x="360" y="128" text-anchor="middle">Offline eval</text>
  <text class="small" x="360" y="157" text-anchor="middle">golden set</text>
  <text class="small" x="360" y="180" text-anchor="middle">grader version</text>
  <rect class="gate" x="505" y="90" width="180" height="95"/>
  <text class="text" x="595" y="128" text-anchor="middle">Benchmark</text>
  <text class="small" x="595" y="157" text-anchor="middle">TTFT / TPOT</text>
  <text class="small" x="595" y="180" text-anchor="middle">throughput / cost</text>
  <rect class="gate" x="745" y="90" width="170" height="95"/>
  <text class="text" x="830" y="128" text-anchor="middle">Safety check</text>
  <text class="small" x="830" y="157" text-anchor="middle">policy / format</text>
  <text class="small" x="830" y="180" text-anchor="middle">critical cases</text>
  <rect class="gate" x="975" y="90" width="180" height="95"/>
  <text class="text" x="1065" y="128" text-anchor="middle">Canary</text>
  <text class="small" x="1065" y="157" text-anchor="middle">1% -> 100%</text>
  <text class="small" x="1065" y="180" text-anchor="middle">analysis gate</text>
  <path class="line" d="M215 138 H275"/>
  <path class="line" d="M445 138 H505"/>
  <path class="line" d="M685 138 H745"/>
  <path class="line" d="M915 138 H975"/>
  <rect class="box" x="785" y="315" width="170" height="95"/>
  <text class="text" x="870" y="353" text-anchor="middle">Promote</text>
  <text class="small" x="870" y="382" text-anchor="middle">new baseline</text>
  <rect class="fail" x="1000" y="315" width="155" height="95"/>
  <text class="text" x="1077" y="353" text-anchor="middle">Rollback</text>
  <text class="small" x="1077" y="382" text-anchor="middle">reduce scope</text>
  <path class="line" d="M1065 185 V260 C1065 290 990 310 955 345"/>
  <path class="line" d="M1085 185 V315"/>
  <rect class="store" x="290" y="305" width="330" height="115"/>
  <text class="text" x="455" y="345" text-anchor="middle">Evidence store</text>
  <text class="small" x="455" y="375" text-anchor="middle">eval run / benchmark run</text>
  <text class="small" x="455" y="398" text-anchor="middle">canary result / failure samples</text>
  <path class="dash" d="M360 185 V305"/>
  <path class="dash" d="M595 185 V305"/>
  <path class="dash" d="M830 185 C760 250 690 300 620 345"/>
  <path class="dash" d="M975 360 H620"/>
  <path class="dash" d="M785 360 H620"/>
</svg>
