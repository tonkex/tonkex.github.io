<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">Throughput latency trade-off curve</title>
  <desc id="desc">A curve showing throughput increasing with concurrency until saturation, while p95 latency rises sharply near capacity.</desc>
  <rect width="1100" height="520" fill="#ffffff"/>
  <text x="550" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#111827">최대 throughput 지점이 항상 운영점은 아니다</text>
  <text x="550" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#4b5563">동시성을 올리면 처리량은 증가하지만, saturation 이후 p95 latency가 더 빠르게 증가한다</text>

  <line x1="150" y1="410" x2="950" y2="410" stroke="#111827" stroke-width="3"/>
  <line x1="150" y1="410" x2="150" y2="120" stroke="#111827" stroke-width="3"/>
  <polygon points="950,410 928,398 928,422" fill="#111827"/>
  <polygon points="150,120 138,142 162,142" fill="#111827"/>
  <text x="550" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">concurrency / request rate</text>
  <text x="80" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827" transform="rotate(-90 80 260)">latency / throughput</text>

  <path d="M170 385 C 260 330, 360 270, 500 230 C 640 190, 760 175, 900 170" fill="none" stroke="#2563eb" stroke-width="5"/>
  <text x="790" y="150" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1d4ed8">throughput</text>

  <path d="M170 390 C 300 382, 470 370, 610 340 C 700 320, 780 250, 900 135" fill="none" stroke="#dc2626" stroke-width="5"/>
  <text x="815" y="125" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#b91c1c">p95 latency</text>

  <rect x="190" y="125" width="395" height="260" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2" opacity="0.72"/>
  <text x="388" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#047857">safe operating region</text>
  <text x="388" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#065f46">latency budget 안에서 처리량 증가</text>

  <rect x="700" y="125" width="210" height="260" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2" opacity="0.78"/>
  <text x="805" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#b91c1c">saturation</text>
  <text x="805" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#991b1b">queue와 tail latency 급증</text>

  <line x1="610" y1="120" x2="610" y2="410" stroke="#f59e0b" stroke-width="3" stroke-dasharray="10 8"/>
  <circle cx="610" cy="337" r="10" fill="#f59e0b"/>
  <text x="610" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#92400e">candidate operating point</text>

  <text x="275" y="358" font-family="Arial, sans-serif" font-size="14" fill="#374151">p95 안정</text>
  <text x="725" y="342" font-family="Arial, sans-serif" font-size="14" fill="#374151">처리량 이득은 작고</text>
  <text x="725" y="364" font-family="Arial, sans-serif" font-size="14" fill="#374151">tail cost는 커짐</text>
</svg>
