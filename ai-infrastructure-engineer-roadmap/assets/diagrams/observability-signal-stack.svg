<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">AI serving observability signal stack</title>
  <desc id="desc">GPU, Kubernetes, runtime, request, and trace signals are joined by common labels.</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 10; }
    .gpu { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2; rx: 10; }
    .k8s { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 10; }
    .runtime { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 10; }
    .request { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; rx: 10; }
    .trace { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; rx: 10; }
    .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; font-size: 17px; }
    .small { font-size: 14px; fill: #334155; }
    .title { font-size: 22px; font-weight: 700; }
    .arrow { stroke: #475569; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="430"/>
  <text class="text title" x="55" y="55">One incident needs multiple observability signals</text>

  <rect class="gpu" x="65" y="100" width="175" height="85"/>
  <text class="text" x="103" y="135">GPU</text>
  <text class="small" x="86" y="162">util, memory, temp</text>

  <rect class="k8s" x="285" y="100" width="175" height="85"/>
  <text class="text" x="337" y="135">Kubernetes</text>
  <text class="small" x="306" y="162">pod, node, replica</text>

  <rect class="runtime" x="505" y="100" width="175" height="85"/>
  <text class="text" x="557" y="135">Runtime</text>
  <text class="small" x="526" y="162">queue, KV, batch</text>

  <rect class="request" x="725" y="100" width="175" height="85"/>
  <text class="text" x="773" y="135">Request</text>
  <text class="small" x="750" y="162">TTFT, TPOT, p95</text>

  <rect class="trace" x="215" y="250" width="550" height="78"/>
  <text class="text" x="410" y="284">Trace and logs</text>
  <text class="small" x="270" y="310">request_id, tenant, route, model, version, pod, node, error cause</text>

  <path class="arrow" d="M240 142 L280 142"/>
  <path class="arrow" d="M460 142 L500 142"/>
  <path class="arrow" d="M680 142 L720 142"/>
  <path class="arrow" d="M155 190 C210 240, 245 252, 300 252"/>
  <path class="arrow" d="M812 190 C765 235, 725 250, 675 252"/>

  <text class="small" x="85" y="385">Useful dashboards align labels across layers: model_name, model_version, pod, node, gpu_uuid, route, tenant, request_id.</text>
</svg>
