<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">GPU node pool scheduling controls</title>
  <desc id="desc">GPU serving pods are placed using node pools, labels, taints, tolerations, node affinity, and resource limits.</desc>
  <style>
    .bg { fill: #f8fafc; }
    .pool { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 12; }
    .a100 { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2; rx: 8; }
    .l40s { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 8; }
    .cpu { fill: #f1f5f9; stroke: #64748b; stroke-width: 2; rx: 8; }
    .pod { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 10; }
    .bad { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; rx: 10; }
    .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; font-size: 17px; }
    .small { font-size: 14px; fill: #334155; }
    .title { font-size: 21px; font-weight: 700; }
    .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .block { stroke: #dc2626; stroke-width: 3; fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="430"/>
  <text class="text title" x="55" y="55">A GPU request is necessary, but placement policy makes it useful</text>

  <rect class="pool" x="55" y="95" width="250" height="250"/>
  <text class="text title" x="85" y="132">A100 pool</text>
  <rect class="a100" x="85" y="155" width="190" height="55"/>
  <text class="small" x="111" y="187">gpu=nvidia-a100</text>
  <rect class="a100" x="85" y="225" width="190" height="55"/>
  <text class="small" x="107" y="257">taint: gpu=true</text>

  <rect class="pool" x="365" y="95" width="250" height="250"/>
  <text class="text title" x="395" y="132">L40S pool</text>
  <rect class="l40s" x="395" y="155" width="190" height="55"/>
  <text class="small" x="423" y="187">gpu=nvidia-l40s</text>
  <rect class="l40s" x="395" y="225" width="190" height="55"/>
  <text class="small" x="417" y="257">taint: gpu=true</text>

  <rect class="pool" x="675" y="95" width="250" height="250"/>
  <text class="text title" x="705" y="132">CPU pool</text>
  <rect class="cpu" x="705" y="155" width="190" height="55"/>
  <text class="small" x="736" y="187">no GPU resource</text>
  <rect class="bad" x="705" y="225" width="190" height="55"/>
  <text class="small" x="738" y="257">GPU pod blocked</text>

  <rect class="pod" x="310" y="365" width="360" height="45"/>
  <text class="small" x="335" y="393">limits + nodeAffinity + toleration + topology spread</text>
  <path class="arrow" d="M420 362 C340 330, 250 290, 185 280"/>
  <path class="arrow" d="M520 362 C535 330, 555 300, 560 280"/>
  <path class="block" d="M718 352 L775 295"/>
  <path class="block" d="M775 352 L718 295"/>
</svg>
