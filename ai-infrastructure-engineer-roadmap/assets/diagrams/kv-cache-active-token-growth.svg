<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" role="img" aria-labelledby="title desc">
  <title id="title">Active tokens drive KV cache memory</title>
  <desc id="desc">A conceptual chart shows how short chat, long RAG, and agent workloads create different active token totals and KV cache memory pressure under concurrency.</desc>
  <rect width="980" height="500" fill="#ffffff"/>
  <g font-family="Inter, Pretendard, Arial, sans-serif">
    <text x="490" y="44" text-anchor="middle" font-size="26" font-weight="800" fill="#0f172a">동시성보다 먼저 active token 총량을 계산한다</text>
    <g transform="translate(84 92)">
      <line x1="0" y1="320" x2="820" y2="320" stroke="#94a3b8" stroke-width="2"/>
      <line x1="0" y1="0" x2="0" y2="320" stroke="#94a3b8" stroke-width="2"/>
      <text x="-22" y="14" text-anchor="end" font-size="13" fill="#475569">KV memory</text>
      <text x="820" y="350" text-anchor="end" font-size="13" fill="#475569">concurrent requests</text>
      <g stroke="#e2e8f0" stroke-width="1">
        <line x1="0" y1="240" x2="820" y2="240"/>
        <line x1="0" y1="160" x2="820" y2="160"/>
        <line x1="0" y1="80" x2="820" y2="80"/>
      </g>
      <polyline points="0,302 130,286 260,270 390,254 520,238 650,222 780,206" fill="none" stroke="#2563eb" stroke-width="5"/>
      <polyline points="0,286 130,250 260,214 390,178 520,142 650,106 780,70" fill="none" stroke="#0f766e" stroke-width="5"/>
      <polyline points="0,270 130,216 260,162 390,108 520,54 650,30 780,20" fill="none" stroke="#ea580c" stroke-width="5" stroke-dasharray="10 8"/>
      <g font-size="14" font-weight="700">
        <text x="610" y="213" fill="#2563eb">short chat</text>
        <text x="606" y="98" fill="#0f766e">long RAG</text>
        <text x="520" y="48" fill="#ea580c">agent / long context</text>
      </g>
    </g>
    <g transform="translate(98 440)" font-size="14" fill="#334155">
      <text x="0" y="0">같은 QPS라도 request당 context length와 output length가 다르면 cache pressure가 완전히 달라진다.</text>
      <text x="0" y="24">운영자는 request 수가 아니라 `active sequences x live tokens`의 p95/p99를 봐야 한다.</text>
    </g>
  </g>
</svg>
