<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">LLM release promotion and rollback flow</title>
  <desc id="desc">Candidate release record moves through evaluation, benchmark, security gate, canary, production alias, observation, and rollback.</desc>
  <defs>
    <style>
      .bg { fill: #fbfbf8; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 12; }
      .record { fill: #eef2ff; stroke: #4f46e5; }
      .gate { fill: #ecfdf5; stroke: #059669; }
      .risk { fill: #fff7ed; stroke: #f97316; }
      .prod { fill: #e0f2fe; stroke: #0284c7; }
      .rollback { fill: #fef2f2; stroke: #dc2626; }
      .label { font-family: Inter, Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #0f172a; }
      .small { font-family: Inter, Arial, sans-serif; font-size: 14px; fill: #334155; }
      .tiny { font-family: Inter, Arial, sans-serif; font-size: 12px; fill: #475569; }
      .arrow { stroke: #475569; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .fail { stroke: #dc2626; stroke-width: 2.4; fill: none; marker-end: url(#arrowRed); stroke-dasharray: 7 5; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569" />
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626" />
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1120" height="560" rx="18" />

  <rect class="box record" x="50" y="76" width="156" height="104" rx="12" />
  <text class="label" x="84" y="116">Candidate</text>
  <text class="small" x="78" y="146">release record</text>

  <rect class="box gate" x="258" y="76" width="150" height="104" rx="12" />
  <text class="label" x="290" y="116">Offline</text>
  <text class="label" x="300" y="140">eval</text>
  <text class="small" x="286" y="164">quality gate</text>

  <rect class="box gate" x="460" y="76" width="150" height="104" rx="12" />
  <text class="label" x="496" y="116">Serving</text>
  <text class="label" x="486" y="140">benchmark</text>
  <text class="small" x="488" y="164">latency, cost</text>

  <rect class="box gate" x="662" y="76" width="150" height="104" rx="12" />
  <text class="label" x="702" y="116">Security</text>
  <text class="label" x="716" y="140">gate</text>
  <text class="small" x="692" y="164">policy, leak</text>

  <rect class="box risk" x="864" y="76" width="150" height="104" rx="12" />
  <text class="label" x="908" y="116">Canary</text>
  <text class="small" x="894" y="146">1% to 100%</text>

  <rect class="box prod" x="864" y="286" width="150" height="104" rx="12" />
  <text class="label" x="890" y="326">Production</text>
  <text class="label" x="912" y="350">alias</text>
  <text class="small" x="890" y="374">points to record</text>

  <rect class="box prod" x="662" y="286" width="150" height="104" rx="12" />
  <text class="label" x="696" y="326">Observe</text>
  <text class="small" x="688" y="356">SLO, cost</text>
  <text class="small" x="688" y="378">quality, safety</text>

  <rect class="box rollback" x="460" y="286" width="150" height="104" rx="12" />
  <text class="label" x="494" y="326">Rollback</text>
  <text class="small" x="488" y="356">previous record</text>

  <rect class="box record" x="258" y="286" width="150" height="104" rx="12" />
  <text class="label" x="286" y="326">Previous</text>
  <text class="label" x="298" y="350">record</text>

  <path class="arrow" d="M206 128 L258 128" />
  <path class="arrow" d="M408 128 L460 128" />
  <path class="arrow" d="M610 128 L662 128" />
  <path class="arrow" d="M812 128 L864 128" />
  <path class="arrow" d="M939 180 L939 286" />
  <path class="arrow" d="M864 338 L812 338" />
  <path class="fail" d="M662 338 L610 338" />
  <path class="fail" d="M460 338 L408 338" />
  <path class="arrow" d="M333 286 C430 226, 718 226, 864 316" />
  <path class="fail" d="M333 390 C280 460, 112 432, 96 180" />

  <text class="tiny" x="86" y="226">Each gate appends evidence to the same release record.</text>
  <text class="tiny" x="528" y="438">Rollback changes the endpoint alias back to a complete previous record.</text>
</svg>
