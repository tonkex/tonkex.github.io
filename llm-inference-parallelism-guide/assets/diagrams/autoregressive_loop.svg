<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Autoregressive generation loop</title>
  <desc id="desc">A prompt is sent to an LLM. The model predicts one next token, appends it to the context, and repeats the process.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .label{font:600 20px sans-serif;fill:#0f172a}
      .small{font:500 15px sans-serif;fill:#475569}
      .box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12}
      .accent{fill:#e0f2fe;stroke:#0369a1;stroke-width:2;rx:12}
      .token{fill:#dcfce7;stroke:#15803d;stroke-width:2;rx:10}
      .arrow{stroke:#334155;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="960" height="360" fill="#ffffff"/>
  <rect x="48" y="76" width="190" height="92" class="box"/>
  <text x="143" y="116" text-anchor="middle" class="label">Prompt</text>
  <text x="143" y="144" text-anchor="middle" class="small">사용자 입력 token</text>

  <path d="M238 122 H315" class="arrow"/>

  <rect x="318" y="54" width="220" height="136" class="accent"/>
  <text x="428" y="105" text-anchor="middle" class="label">LLM</text>
  <text x="428" y="135" text-anchor="middle" class="small">다음 token 확률분포 계산</text>
  <text x="428" y="162" text-anchor="middle" class="small">parameter는 고정</text>

  <path d="M538 122 H615" class="arrow"/>

  <rect x="618" y="76" width="180" height="92" class="token"/>
  <text x="708" y="116" text-anchor="middle" class="label">Next token</text>
  <text x="708" y="144" text-anchor="middle" class="small">하나 선택</text>

  <path d="M708 168 V248 H166 V170" class="arrow"/>
  <rect x="250" y="232" width="420" height="78" class="box"/>
  <text x="460" y="265" text-anchor="middle" class="label">Context에 붙이고 반복</text>
  <text x="460" y="292" text-anchor="middle" class="small">이전 output token이 다음 token의 조건이 된다</text>
</svg>
