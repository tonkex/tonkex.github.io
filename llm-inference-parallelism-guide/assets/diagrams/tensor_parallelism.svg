<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">Tensor Parallelism</title>
  <desc id="desc">A large matrix multiplication inside a model layer is split across multiple GPUs, and partial results are combined.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .h{font:700 22px sans-serif;fill:#0f172a}
      .t{font:500 16px sans-serif;fill:#475569}
      .in{fill:#e0f2fe;stroke:#0369a1;stroke-width:2;rx:10}
      .part1{fill:#dcfce7;stroke:#15803d;stroke-width:2;rx:10}
      .part2{fill:#fef3c7;stroke:#b45309;stroke-width:2;rx:10}
      .part3{fill:#f3e8ff;stroke:#7e22ce;stroke-width:2;rx:10}
      .out{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}
      .arrow{stroke:#334155;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="960" height="500" fill="#fff"/>
  <text x="480" y="52" text-anchor="middle" class="h">Tensor Parallelism: layer 내부 큰 행렬 계산을 나눈다</text>

  <rect x="65" y="205" width="155" height="80" class="in"/>
  <text x="142" y="238" text-anchor="middle" class="h">Input</text>
  <text x="142" y="264" text-anchor="middle" class="t">hidden states</text>
  <path d="M220 245 H305" class="arrow"/>

  <rect x="310" y="95" width="250" height="78" class="part1"/>
  <text x="435" y="127" text-anchor="middle" class="h">GPU 0</text>
  <text x="435" y="153" text-anchor="middle" class="t">weight shard 0 계산</text>
  <rect x="310" y="205" width="250" height="78" class="part2"/>
  <text x="435" y="237" text-anchor="middle" class="h">GPU 1</text>
  <text x="435" y="263" text-anchor="middle" class="t">weight shard 1 계산</text>
  <rect x="310" y="315" width="250" height="78" class="part3"/>
  <text x="435" y="347" text-anchor="middle" class="h">GPU 2</text>
  <text x="435" y="373" text-anchor="middle" class="t">weight shard 2 계산</text>

  <path d="M560 134 C620 150,640 195,678 230" class="arrow"/>
  <path d="M560 244 H675" class="arrow"/>
  <path d="M560 354 C620 338,640 293,678 260" class="arrow"/>

  <rect x="680" y="200" width="205" height="92" class="out"/>
  <text x="782" y="236" text-anchor="middle" class="h">결과 통합</text>
  <text x="782" y="264" text-anchor="middle" class="t">all-reduce / all-gather</text>
</svg>
