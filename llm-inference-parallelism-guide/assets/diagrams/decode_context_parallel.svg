<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Decode Context Parallelism</title>
  <desc id="desc">During decode, the new query attends to KV cache shards on multiple GPUs. Partial attention outputs are combined.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .h{font:700 22px sans-serif;fill:#0f172a}
      .t{font:500 16px sans-serif;fill:#475569}
      .q{fill:#fee2e2;stroke:#b91c1c;stroke-width:2;rx:12}
      .kv1{fill:#e0f2fe;stroke:#0369a1;stroke-width:2;rx:12}
      .kv2{fill:#dcfce7;stroke:#15803d;stroke-width:2;rx:12}
      .kv3{fill:#fef3c7;stroke:#b45309;stroke-width:2;rx:12}
      .out{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12}
      .arrow{stroke:#334155;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="960" height="520" fill="#fff"/>
  <text x="480" y="52" text-anchor="middle" class="h">Decode Context Parallel: KV cache를 나누고 partial attention을 합친다</text>

  <rect x="65" y="220" width="170" height="78" class="q"/>
  <text x="150" y="252" text-anchor="middle" class="h">New token query</text>
  <text x="150" y="278" text-anchor="middle" class="t">decode step</text>

  <path d="M235 259 C300 110,350 105,405 120" class="arrow"/>
  <path d="M235 259 H405" class="arrow"/>
  <path d="M235 259 C300 408,350 413,405 398" class="arrow"/>

  <rect x="408" y="85" width="220" height="88" class="kv1"/>
  <text x="518" y="120" text-anchor="middle" class="h">GPU 0 KV shard</text>
  <text x="518" y="148" text-anchor="middle" class="t">partial attention 0</text>
  <rect x="408" y="215" width="220" height="88" class="kv2"/>
  <text x="518" y="250" text-anchor="middle" class="h">GPU 1 KV shard</text>
  <text x="518" y="278" text-anchor="middle" class="t">partial attention 1</text>
  <rect x="408" y="345" width="220" height="88" class="kv3"/>
  <text x="518" y="380" text-anchor="middle" class="h">GPU 2 KV shard</text>
  <text x="518" y="408" text-anchor="middle" class="t">partial attention 2</text>

  <path d="M628 129 C690 145,715 196,748 238" class="arrow"/>
  <path d="M628 259 H745" class="arrow"/>
  <path d="M628 389 C690 373,715 322,748 280" class="arrow"/>

  <rect x="750" y="220" width="160" height="78" class="out"/>
  <text x="830" y="252" text-anchor="middle" class="h">Reduce</text>
  <text x="830" y="278" text-anchor="middle" class="t">최종 attention</text>
</svg>
