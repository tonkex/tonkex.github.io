<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">Token and context window</title>
  <desc id="desc">A context window contains input tokens and output tokens. Long prompts reduce room for output and increase inference cost.</desc>
  <style>
    .h{font:700 22px sans-serif;fill:#0f172a}
    .t{font:500 16px sans-serif;fill:#475569}
    .axis{stroke:#334155;stroke-width:3}
    .prompt{fill:#e0f2fe;stroke:#0369a1;stroke-width:2;rx:8}
    .out{fill:#dcfce7;stroke:#15803d;stroke-width:2;rx:8}
    .empty{fill:#f8fafc;stroke:#cbd5e1;stroke-width:2;rx:8}
  </style>
  <rect width="960" height="430" fill="#fff"/>
  <text x="480" y="54" text-anchor="middle" class="h">Context window = 입력 token + 생성된 output token</text>
  <line x1="90" y1="130" x2="870" y2="130" class="axis"/>
  <text x="90" y="106" text-anchor="middle" class="t">0</text>
  <text x="870" y="106" text-anchor="middle" class="t">max context length</text>

  <rect x="100" y="156" width="430" height="70" class="prompt"/>
  <text x="315" y="197" text-anchor="middle" class="h">Prompt / history tokens</text>
  <rect x="532" y="156" width="190" height="70" class="out"/>
  <text x="627" y="197" text-anchor="middle" class="h">Output tokens</text>
  <rect x="724" y="156" width="136" height="70" class="empty"/>
  <text x="792" y="197" text-anchor="middle" class="t">남은 공간</text>

  <rect x="100" y="278" width="610" height="70" class="prompt"/>
  <text x="405" y="319" text-anchor="middle" class="h">Long prompt / 긴 대화 history</text>
  <rect x="712" y="278" width="86" height="70" class="out"/>
  <text x="755" y="319" text-anchor="middle" class="t">Output</text>
  <rect x="800" y="278" width="60" height="70" class="empty"/>
  <text x="830" y="319" text-anchor="middle" class="t">여유</text>
</svg>
