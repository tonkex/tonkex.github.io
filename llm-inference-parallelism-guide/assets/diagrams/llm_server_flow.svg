<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460" role="img" aria-labelledby="title desc">
  <title id="title">LLM server request flow</title>
  <desc id="desc">An LLM request flows through API server, tokenizer, scheduler, worker prefill and decode, then streaming response.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .h{font:700 21px sans-serif;fill:#0f172a}
      .t{font:500 15px sans-serif;fill:#475569}
      .box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12}
      .api{fill:#e0f2fe;stroke:#0369a1;stroke-width:2;rx:12}
      .sched{fill:#fef3c7;stroke:#b45309;stroke-width:2;rx:12}
      .worker{fill:#dcfce7;stroke:#15803d;stroke-width:2;rx:12}
      .arrow{stroke:#334155;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="960" height="460" fill="#fff"/>
  <text x="480" y="52" text-anchor="middle" class="h">LLM 서버 요청 처리 흐름</text>

  <rect x="55" y="170" width="130" height="78" class="box"/>
  <text x="120" y="202" text-anchor="middle" class="h">Request</text>
  <text x="120" y="228" text-anchor="middle" class="t">prompt</text>
  <path d="M185 209 H245" class="arrow"/>

  <rect x="248" y="155" width="140" height="108" class="api"/>
  <text x="318" y="192" text-anchor="middle" class="h">API server</text>
  <text x="318" y="218" text-anchor="middle" class="t">인증, 파라미터</text>
  <text x="318" y="241" text-anchor="middle" class="t">stream 관리</text>
  <path d="M388 209 H448" class="arrow"/>

  <rect x="450" y="155" width="140" height="108" class="box"/>
  <text x="520" y="192" text-anchor="middle" class="h">Tokenizer</text>
  <text x="520" y="218" text-anchor="middle" class="t">text -> token</text>
  <text x="520" y="241" text-anchor="middle" class="t">template 적용</text>
  <path d="M590 209 H650" class="arrow"/>

  <rect x="652" y="155" width="140" height="108" class="sched"/>
  <text x="722" y="192" text-anchor="middle" class="h">Scheduler</text>
  <text x="722" y="218" text-anchor="middle" class="t">batch 구성</text>
  <text x="722" y="241" text-anchor="middle" class="t">KV block 할당</text>

  <path d="M722 263 V318 H240 V263" class="arrow"/>
  <text x="480" y="350" text-anchor="middle" class="t">worker가 prefill과 decode를 반복하고 token을 streaming한다</text>

  <rect x="275" y="315" width="170" height="74" class="worker"/>
  <text x="360" y="348" text-anchor="middle" class="h">Prefill</text>
  <text x="360" y="373" text-anchor="middle" class="t">KV cache 생성</text>
  <rect x="515" y="315" width="170" height="74" class="worker"/>
  <text x="600" y="348" text-anchor="middle" class="h">Decode loop</text>
  <text x="600" y="373" text-anchor="middle" class="t">token 생성</text>
</svg>
