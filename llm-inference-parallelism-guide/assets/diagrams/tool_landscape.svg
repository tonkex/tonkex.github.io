<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">LLM inference tool landscape</title>
  <desc id="desc">vLLM, SGLang, and TensorRT-LLM emphasize different aspects of LLM serving and optimization.</desc>
  <style>
    .h{font:700 22px sans-serif;fill:#0f172a}
    .t{font:500 16px sans-serif;fill:#475569}
    .v{fill:#e0f2fe;stroke:#0369a1;stroke-width:2;rx:14}
    .s{fill:#dcfce7;stroke:#15803d;stroke-width:2;rx:14}
    .n{fill:#fef3c7;stroke:#b45309;stroke-width:2;rx:14}
    .axis{stroke:#334155;stroke-width:3}
  </style>
  <rect width="960" height="500" fill="#fff"/>
  <text x="480" y="52" text-anchor="middle" class="h">도구별 관점: 무엇을 먼저 배우면 좋은가</text>
  <line x1="110" y1="395" x2="850" y2="395" class="axis"/>
  <text x="160" y="430" text-anchor="middle" class="t">개념 학습 쉬움</text>
  <text x="800" y="430" text-anchor="middle" class="t">production 최적화 깊음</text>

  <rect x="120" y="145" width="220" height="140" class="v"/>
  <text x="230" y="185" text-anchor="middle" class="h">vLLM</text>
  <text x="230" y="215" text-anchor="middle" class="t">OpenAI-compatible</text>
  <text x="230" y="242" text-anchor="middle" class="t">PagedAttention</text>
  <text x="230" y="269" text-anchor="middle" class="t">입문 실습에 적합</text>

  <rect x="370" y="115" width="220" height="170" class="s"/>
  <text x="480" y="155" text-anchor="middle" class="h">SGLang</text>
  <text x="480" y="185" text-anchor="middle" class="t">structured generation</text>
  <text x="480" y="212" text-anchor="middle" class="t">RadixAttention</text>
  <text x="480" y="239" text-anchor="middle" class="t">Agent/RAG workload</text>
  <text x="480" y="266" text-anchor="middle" class="t">prefix reuse</text>

  <rect x="620" y="145" width="220" height="140" class="n"/>
  <text x="730" y="185" text-anchor="middle" class="h">TensorRT-LLM</text>
  <text x="730" y="215" text-anchor="middle" class="t">NVIDIA 최적화</text>
  <text x="730" y="242" text-anchor="middle" class="t">engine/runtime</text>
  <text x="730" y="269" text-anchor="middle" class="t">고성능 serving</text>
</svg>
