<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842" role="img" aria-labelledby="title desc">
  <title id="title">LLM 추론 및 추론 병렬화 입문 개발자용 가이드북 표지</title>
  <desc id="desc">어두운 배경 위에 GPU 노드, KV cache 블록, 병렬 처리 흐름을 추상적으로 표현한 표지</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.48" stop-color="#172554"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="0.52" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <style>
      .ko { font-family: "NanumBarunGothic", "Apple SD Gothic Neo", "Noto Sans CJK KR", sans-serif; }
      .mono { font-family: "SFMono-Regular", "Menlo", "Consolas", monospace; }
      .thin { fill: none; stroke: #94a3b8; stroke-width: 1; opacity: 0.28; }
      .line { fill: none; stroke: url(#accent); stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .node { fill: #0f172a; stroke: #38bdf8; stroke-width: 2; }
      .node2 { fill: #111827; stroke: #22c55e; stroke-width: 2; }
      .node3 { fill: #171717; stroke: #a78bfa; stroke-width: 2; }
      .label { fill: #cbd5e1; font-size: 13px; }
      .small { fill: #94a3b8; font-size: 11px; }
      .title { fill: #f8fafc; font-weight: 800; font-size: 43px; letter-spacing: 0; }
      .subtitle { fill: #dbeafe; font-size: 19px; }
      .chip { fill: #e2e8f0; font-size: 12px; font-weight: 700; }
    </style>
  </defs>

  <rect width="595" height="842" fill="url(#bg)"/>
  <g opacity="0.38">
    <path class="thin" d="M-20 118 H615"/>
    <path class="thin" d="M-20 182 H615"/>
    <path class="thin" d="M-20 246 H615"/>
    <path class="thin" d="M-20 310 H615"/>
    <path class="thin" d="M-20 374 H615"/>
    <path class="thin" d="M-20 438 H615"/>
    <path class="thin" d="M-20 502 H615"/>
    <path class="thin" d="M-20 566 H615"/>
    <path class="thin" d="M-20 630 H615"/>
    <path class="thin" d="M70 -20 V862"/>
    <path class="thin" d="M142 -20 V862"/>
    <path class="thin" d="M214 -20 V862"/>
    <path class="thin" d="M286 -20 V862"/>
    <path class="thin" d="M358 -20 V862"/>
    <path class="thin" d="M430 -20 V862"/>
    <path class="thin" d="M502 -20 V862"/>
  </g>

  <g transform="translate(50 62)">
    <rect x="0" y="0" width="128" height="30" rx="15" fill="#020617" opacity="0.8"/>
    <circle cx="18" cy="15" r="5" fill="#22c55e"/>
    <text x="32" y="20" class="ko chip">Beginner Guide</text>
  </g>

  <g transform="translate(50 142)">
    <text x="0" y="0" class="ko title">LLM 추론 및</text>
    <text x="0" y="56" class="ko title">추론 병렬화</text>
    <text x="0" y="112" class="ko title">입문 가이드</text>
    <rect x="0" y="145" width="330" height="4" rx="2" fill="url(#accent)"/>
    <text x="0" y="190" class="ko subtitle">KV Cache에서 Tensor Parallelism,</text>
    <text x="0" y="218" class="ko subtitle">Decode Context Parallel까지</text>
    <text x="0" y="258" class="ko label">개발자를 위한 LLM 추론 시스템의 원리와 실습</text>
  </g>

  <g transform="translate(54 468)" filter="url(#softShadow)">
    <rect x="0" y="0" width="487" height="238" rx="20" fill="url(#panel)" stroke="#60a5fa" stroke-opacity="0.28"/>
    <path class="line" d="M78 122 C138 56 210 56 270 122 S402 188 454 116"/>
    <path class="line" d="M78 158 C146 188 222 188 292 150 S390 92 454 132" opacity="0.55"/>

    <g transform="translate(42 48)">
      <rect x="0" y="0" width="82" height="62" rx="10" class="node"/>
      <text x="17" y="28" class="mono small">GPU 0</text>
      <text x="15" y="47" class="ko small">prefill</text>
    </g>
    <g transform="translate(202 38)">
      <rect x="0" y="0" width="82" height="62" rx="10" class="node2"/>
      <text x="17" y="28" class="mono small">GPU 1</text>
      <text x="18" y="47" class="ko small">decode</text>
    </g>
    <g transform="translate(362 52)">
      <rect x="0" y="0" width="82" height="62" rx="10" class="node3"/>
      <text x="17" y="28" class="mono small">GPU 2</text>
      <text x="15" y="47" class="ko small">cache</text>
    </g>

    <g transform="translate(58 151)">
      <rect x="0" y="0" width="40" height="18" rx="4" fill="#22c55e" opacity="0.75"/>
      <rect x="48" y="0" width="40" height="18" rx="4" fill="#38bdf8" opacity="0.75"/>
      <rect x="96" y="0" width="40" height="18" rx="4" fill="#a78bfa" opacity="0.75"/>
      <rect x="144" y="0" width="40" height="18" rx="4" fill="#f59e0b" opacity="0.75"/>
      <text x="0" y="46" class="ko small">KV cache blocks</text>
    </g>

    <g transform="translate(300 151)">
      <circle cx="12" cy="10" r="6" fill="#38bdf8"/>
      <circle cx="42" cy="10" r="6" fill="#22c55e"/>
      <circle cx="72" cy="10" r="6" fill="#a78bfa"/>
      <path d="M18 10 H36 M48 10 H66" stroke="#cbd5e1" stroke-width="2"/>
      <text x="0" y="46" class="ko small">parallel workers</text>
    </g>
  </g>

  <g transform="translate(50 746)">
    <text x="0" y="0" class="mono small">prefill -> decode -> KV cache -> batching -> tensor/context parallelism</text>
    <text x="0" y="34" class="ko small">LLM Inference Parallelism Beginner Developer Guide</text>
  </g>
</svg>
