<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 430" role="img" aria-labelledby="title desc"><title id="title">Fokker-Planck 관점에서 본 Diffusion과 Flow Matching</title><desc id="desc">공통 연속방정식에서 drift와 diffusion flux를 나누고 D 값에 따라 Flow Matching과 Diffusion을 비교한다.</desc><rect width="960" height="430" fill="#f8fafc"/><g font-family="Pretendard, Arial, sans-serif"><text x="480" y="42" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">같은 확률 질량 보존, 다른 flux 구성</text><rect x="160" y="76" width="640" height="58" rx="12" fill="#ffffff" stroke="#cbd5e1"/><text x="480" y="112" text-anchor="middle" font-size="21" font-weight="800" fill="#334155">∂p/∂t + ∇·J = 0</text><path d="M480 134 V168" stroke="#64748b" stroke-width="3"/><rect x="240" y="168" width="480" height="58" rx="12" fill="#eef2ff" stroke="#818cf8"/><text x="480" y="204" text-anchor="middle" font-size="20" font-weight="800" fill="#3730a3">J = f·p − D∇p</text><path d="M400 226 C330 260 285 275 220 302" stroke="#16a34a" stroke-width="3" fill="none"/><path d="M560 226 C630 260 675 275 740 302" stroke="#f97316" stroke-width="3" fill="none"/><rect x="55" y="298" width="330" height="90" rx="16" fill="#ecfdf5" stroke="#34d399"/><text x="220" y="330" text-anchor="middle" font-size="19" font-weight="800" fill="#047857">Flow Matching</text><text x="220" y="356" text-anchor="middle" font-size="14" fill="#334155">D = 0에 가까운 deterministic flow 직관</text><text x="220" y="378" text-anchor="middle" font-size="14" fill="#334155">J = p·u, ODE로 샘플 이동</text><rect x="575" y="298" width="330" height="90" rx="16" fill="#fff7ed" stroke="#fb923c"/><text x="740" y="330" text-anchor="middle" font-size="19" font-weight="800" fill="#c2410c">Diffusion</text><text x="740" y="356" text-anchor="middle" font-size="14" fill="#334155">D &gt; 0인 확산 효과가 핵심</text><text x="740" y="378" text-anchor="middle" font-size="14" fill="#334155">drift + noise, reverse SDE/score</text><text x="480" y="414" text-anchor="middle" font-size="13" fill="#64748b">주의: 이 도식은 공통 수학 직관을 위한 지도이며, 모든 변형을 단일 D 값으로 환원하는 분류는 아니다.</text></g></svg>
