<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-labelledby="title desc"><title id="title">NF에서 CNF와 Flow Matching으로 이어지는 계보</title><desc id="desc">Normalizing Flow, Neural ODE, CNF, Flow Matching의 문제의식 연결</desc><rect width="960" height="360" fill="#f8fafc"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/></marker></defs><text x="480" y="42" text-anchor="middle" font-family="Pretendard, Arial, sans-serif" font-size="25" font-weight="800" fill="#0f172a">NF → Neural ODE → CNF → Flow Matching</text><g font-family="Pretendard, Arial, sans-serif"><rect x="45" y="92" width="180" height="128" rx="14" fill="#e0f2fe" stroke="#38bdf8"/><text x="135" y="126" text-anchor="middle" font-size="18" font-weight="800" fill="#075985">Normalizing Flow</text><text x="135" y="155" text-anchor="middle" font-size="13" fill="#334155">가역 변환을 층으로 쌓음</text><text x="135" y="180" text-anchor="middle" font-size="13" fill="#334155">정확한 likelihood</text><text x="135" y="205" text-anchor="middle" font-size="13" fill="#334155">Jacobian 제약</text><rect x="282" y="92" width="180" height="128" rx="14" fill="#fef3c7" stroke="#f59e0b"/><text x="372" y="126" text-anchor="middle" font-size="18" font-weight="800" fill="#92400e">Neural ODE</text><text x="372" y="155" text-anchor="middle" font-size="13" fill="#334155">잔차 업데이트의</text><text x="372" y="180" text-anchor="middle" font-size="13" fill="#334155">연속 시간 극한</text><text x="372" y="205" text-anchor="middle" font-size="13" fill="#334155">velocity field</text><rect x="519" y="92" width="180" height="128" rx="14" fill="#dcfce7" stroke="#22c55e"/><text x="609" y="126" text-anchor="middle" font-size="18" font-weight="800" fill="#166534">CNF</text><text x="609" y="155" text-anchor="middle" font-size="13" fill="#334155">ODE로 분포 이동</text><text x="609" y="180" text-anchor="middle" font-size="13" fill="#334155">구조 제약 완화</text><text x="609" y="205" text-anchor="middle" font-size="13" fill="#b91c1c">학습 중 ODE 비용</text><rect x="756" y="92" width="180" height="128" rx="14" fill="#ede9fe" stroke="#8b5cf6"/><text x="846" y="126" text-anchor="middle" font-size="18" font-weight="800" fill="#5b21b6">Flow Matching</text><text x="846" y="155" text-anchor="middle" font-size="13" fill="#334155">경로를 먼저 설계</text><text x="846" y="180" text-anchor="middle" font-size="13" fill="#334155">정답 속도 회귀</text><text x="846" y="205" text-anchor="middle" font-size="13" fill="#334155">simulation-free 학습</text><path d="M225 156 H282" stroke="#2563eb" stroke-width="3" marker-end="url(#a)"/><path d="M462 156 H519" stroke="#2563eb" stroke-width="3" marker-end="url(#a)"/><path d="M699 156 H756" stroke="#2563eb" stroke-width="3" marker-end="url(#a)"/><rect x="88" y="260" width="784" height="48" rx="12" fill="#ffffff" stroke="#cbd5e1"/><text x="480" y="291" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">핵심 흐름: 정확한 분포 이동 언어는 유지하고, 학습 중 ODE simulation 병목을 속도 회귀로 우회한다.</text></g></svg>
