<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc"><title id="title">CNF 학습과 Flow Matching 학습의 차이</title><desc id="desc">CNF는 학습 중 ODE rollout과 likelihood 계산이 필요하고, Flow Matching은 경로에서 정답 속도를 만들어 회귀한다.</desc><rect width="960" height="420" fill="#f8fafc"/><defs><marker id="r" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#ef4444"/></marker><marker id="g" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#16a34a"/></marker></defs><g font-family="Pretendard, Arial, sans-serif"><text x="480" y="42" text-anchor="middle" font-size="25" font-weight="800" fill="#0f172a">학습 루프 안에 ODE가 있는가?</text><rect x="55" y="82" width="385" height="270" rx="16" fill="#fff1f2" stroke="#fb7185"/><text x="247" y="120" text-anchor="middle" font-size="20" font-weight="800" fill="#be123c">CNF: simulation-based</text><rect x="125" y="152" width="245" height="38" rx="8" fill="#ffffff" stroke="#fecdd3"/><text x="247" y="176" text-anchor="middle" font-size="14" fill="#334155">현재 모델 fθ로 ODE 풀기</text><path d="M247 190 V220" stroke="#ef4444" stroke-width="3" marker-end="url(#r)"/><rect x="125" y="220" width="245" height="38" rx="8" fill="#ffffff" stroke="#fecdd3"/><text x="247" y="244" text-anchor="middle" font-size="14" fill="#334155">log p와 trajectory 계산</text><path d="M247 258 V288" stroke="#ef4444" stroke-width="3" marker-end="url(#r)"/><rect x="125" y="288" width="245" height="38" rx="8" fill="#ffffff" stroke="#fecdd3"/><text x="247" y="312" text-anchor="middle" font-size="14" fill="#334155">solver를 거쳐 역전파</text><text x="247" y="342" text-anchor="middle" font-size="13" font-weight="700" fill="#be123c">메모리 · 속도 · 수치오차 부담</text><rect x="520" y="82" width="385" height="270" rx="16" fill="#ecfdf5" stroke="#34d399"/><text x="712" y="120" text-anchor="middle" font-size="20" font-weight="800" fill="#047857">Flow Matching: simulation-free</text><rect x="590" y="152" width="245" height="38" rx="8" fill="#ffffff" stroke="#bbf7d0"/><text x="712" y="176" text-anchor="middle" font-size="14" fill="#334155">경로 xₜ=(1-t)x₀+tx₁ 설계</text><path d="M712 190 V220" stroke="#16a34a" stroke-width="3" marker-end="url(#g)"/><rect x="590" y="220" width="245" height="38" rx="8" fill="#ffffff" stroke="#bbf7d0"/><text x="712" y="244" text-anchor="middle" font-size="14" fill="#334155">정답 속도 uₜ=x₁−x₀ 계산</text><path d="M712 258 V288" stroke="#16a34a" stroke-width="3" marker-end="url(#g)"/><rect x="590" y="288" width="245" height="38" rx="8" fill="#ffffff" stroke="#bbf7d0"/><text x="712" y="312" text-anchor="middle" font-size="14" fill="#334155">MSE 회귀로 모델 학습</text><text x="712" y="342" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">학습 루프 안에 ODE rollout 없음</text><text x="480" y="386" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">생성할 때는 둘 다 ODE를 쓸 수 있다. 차이는 학습 시점의 비용 구조다.</text></g></svg>
