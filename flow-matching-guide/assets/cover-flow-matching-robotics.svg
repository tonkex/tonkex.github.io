<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Flow Matching guide cover image</title>
  <desc id="desc">A conceptual cover image showing probability flow from noise to structured data and robotic action trajectories.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.45" stop-color="#17324d"/>
      <stop offset="1" stop-color="#13251f"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="0.5" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#facc15"/>
    </linearGradient>
    <linearGradient id="arm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e2e8f0"/>
      <stop offset="1" stop-color="#94a3b8"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5eead4"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.2">
    <path d="M0 690 C260 600 390 760 620 650 C860 536 1030 610 1260 500 C1410 428 1510 420 1600 450" fill="none" stroke="#93c5fd" stroke-width="2"/>
    <path d="M0 760 C260 690 420 810 660 700 C890 594 1110 690 1360 560 C1470 504 1540 500 1600 515" fill="none" stroke="#2dd4bf" stroke-width="2"/>
    <path d="M0 180 C230 250 370 116 610 210 C850 304 1010 170 1230 250 C1390 308 1500 270 1600 230" fill="none" stroke="#fef08a" stroke-width="2"/>
  </g>

  <g transform="translate(120 140)">
    <text x="0" y="0" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="700">Flow Matching</text>
    <text x="0" y="62" fill="#bae6fd" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="500">from probability paths to robot actions</text>
  </g>

  <g transform="translate(130 315)" opacity="0.95">
    <text x="0" y="-26" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="22">noise prior</text>
    <g fill="#93c5fd" opacity="0.85">
      <circle cx="34" cy="72" r="8"/>
      <circle cx="82" cy="28" r="5"/>
      <circle cx="116" cy="110" r="7"/>
      <circle cx="168" cy="58" r="6"/>
      <circle cx="214" cy="122" r="5"/>
      <circle cx="238" cy="36" r="8"/>
      <circle cx="286" cy="92" r="6"/>
      <circle cx="320" cy="44" r="5"/>
      <circle cx="360" cy="126" r="7"/>
      <circle cx="410" cy="76" r="5"/>
    </g>
    <ellipse cx="210" cy="78" rx="230" ry="120" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.5"/>
  </g>

  <g fill="none" stroke="url(#flow)" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" filter="url(#softGlow)">
    <path d="M500 395 C660 250 800 245 965 330"/>
    <path d="M500 470 C690 405 800 440 980 408"/>
    <path d="M500 545 C680 640 850 610 1010 500"/>
  </g>

  <g transform="translate(980 238)">
    <text x="34" y="-28" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="22">structured data manifold</text>
    <path d="M80 160 C130 64 240 52 308 128 C374 202 478 142 540 56" fill="none" stroke="#facc15" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
    <path d="M80 250 C160 150 258 202 336 260 C430 330 510 250 570 176" fill="none" stroke="#5eead4" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
    <g fill="#f8fafc">
      <circle cx="80" cy="160" r="10"/>
      <circle cx="308" cy="128" r="10"/>
      <circle cx="540" cy="56" r="10"/>
      <circle cx="80" cy="250" r="10"/>
      <circle cx="336" cy="260" r="10"/>
      <circle cx="570" cy="176" r="10"/>
    </g>
  </g>

  <g transform="translate(980 535)">
    <text x="34" y="-28" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="22">robot action trajectory</text>
    <path d="M90 250 L210 158 L330 214 L444 112" fill="none" stroke="url(#arm)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#e2e8f0" stroke="#64748b" stroke-width="5">
      <circle cx="90" cy="250" r="38"/>
      <circle cx="210" cy="158" r="32"/>
      <circle cx="330" cy="214" r="30"/>
      <circle cx="444" cy="112" r="26"/>
    </g>
    <path d="M470 104 C530 78 584 82 638 112" fill="none" stroke="#facc15" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow)"/>
    <path d="M72 312 L510 312" stroke="#334155" stroke-width="18" stroke-linecap="round"/>
  </g>

  <g transform="translate(124 752)">
    <rect x="0" y="0" width="600" height="74" rx="18" fill="#0f172a" opacity="0.55"/>
    <circle cx="42" cy="37" r="11" fill="#60a5fa"/>
    <circle cx="196" cy="37" r="11" fill="#5eead4"/>
    <circle cx="368" cy="37" r="11" fill="#facc15"/>
    <text x="68" y="46" fill="#dbeafe" font-family="Inter, Arial, sans-serif" font-size="24">noise</text>
    <text x="222" y="46" fill="#ccfbf1" font-family="Inter, Arial, sans-serif" font-size="24">velocity field</text>
    <text x="394" y="46" fill="#fef9c3" font-family="Inter, Arial, sans-serif" font-size="24">actions</text>
  </g>
</svg>
